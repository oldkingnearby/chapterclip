name: chapterclip
description: "An Android EPUB chapter clipping app for reading, chunking, tracking, and copying book text."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  archive: ^4.0.9
  characters: ^1.2.1
  collection: ^1.17.0
  cupertino_icons: ^1.0.5
  drift: ^2.8.0
  file_selector: ^1.0.0
  flutter_riverpod: ^2.3.6
  html: ^0.15.4
  intl: ^0.18.1
  path: ^1.8.2
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  sqlite3_flutter_libs: ^0.5.24
  xml: ^6.2.2

dev_dependencies:
  build_runner: ^2.3.3
  drift_dev: ^2.8.0
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  path_provider_windows: 2.3.0
  win32: 6.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
